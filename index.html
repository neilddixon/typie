<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typie - Learn to Type!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- SCREEN: Welcome -->
  <div id="screen-welcome" class="screen active">
    <div class="hero">
      <div class="logo">⌨️</div>
      <h1>Typie</h1>
      <p class="subtitle">Learn to type with the right fingers!</p>
      <button class="btn-primary" onclick="startLesson()">Start Learning 🚀</button>
    </div>
  </div>

  <!-- SCREEN: Lesson (finger intro) -->
  <div id="screen-lesson" class="screen">
    <div class="lesson-header">
      <span id="lesson-title" class="lesson-title"></span>
      <div class="score-bar">
        <span>⭐ <span id="score">0</span></span>
        <span>Level <span id="level">1</span></span>
      </div>
    </div>

    <!-- Hand diagram -->
    <div class="hands-container">
      <div class="hand" id="hand-left">
        <div class="hand-label">Left Hand</div>
        <div class="fingers">
          <div class="finger" id="lp" data-finger="lp" style="--fc:var(--lp)">
            <svg class="finger-svg" viewBox="0 0 40 90" xmlns="http://www.w3.org/2000/svg">
              <!-- finger body -->
              <rect x="6" y="18" width="28" height="66" rx="8" fill="#f5c5a3"/>
              <!-- knuckle lines -->
              <path d="M8 50 Q20 47 32 50" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <path d="M8 65 Q20 62 32 65" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <!-- fingernail -->
              <rect x="10" y="20" width="20" height="18" rx="6" fill="#f9e0d0" stroke="#d4956a" stroke-width="1"/>
              <rect x="12" y="22" width="16" height="12" rx="4" fill="#fce8dc"/>
              <!-- highlight -->
              <ellipse cx="16" cy="28" rx="4" ry="5" fill="rgba(255,255,255,.3)"/>
              <!-- color band at bottom -->
              <rect x="6" y="74" width="28" height="10" rx="0 0 8 8" fill="var(--fc)" opacity=".85"/>
            </svg>
            <span>Pinky</span>
          </div>
          <div class="finger" id="lr" data-finger="lr" style="--fc:var(--lr)">
            <svg class="finger-svg tall" viewBox="0 0 40 100" xmlns="http://www.w3.org/2000/svg">
              <rect x="6" y="14" width="28" height="80" rx="8" fill="#f5c5a3"/>
              <path d="M8 55 Q20 52 32 55" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <path d="M8 72 Q20 69 32 72" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <rect x="10" y="16" width="20" height="18" rx="6" fill="#f9e0d0" stroke="#d4956a" stroke-width="1"/>
              <rect x="12" y="18" width="16" height="12" rx="4" fill="#fce8dc"/>
              <ellipse cx="16" cy="24" rx="4" ry="5" fill="rgba(255,255,255,.3)"/>
              <rect x="6" y="84" width="28" height="10" rx="0 0 8 8" fill="var(--fc)" opacity=".85"/>
            </svg>
            <span>Ring</span>
          </div>
          <div class="finger" id="lm" data-finger="lm" style="--fc:var(--lm)">
            <svg class="finger-svg tallest" viewBox="0 0 40 110" xmlns="http://www.w3.org/2000/svg">
              <rect x="6" y="10" width="28" height="94" rx="8" fill="#f5c5a3"/>
              <path d="M8 58 Q20 55 32 58" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <path d="M8 76 Q20 73 32 76" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <rect x="10" y="12" width="20" height="18" rx="6" fill="#f9e0d0" stroke="#d4956a" stroke-width="1"/>
              <rect x="12" y="14" width="16" height="12" rx="4" fill="#fce8dc"/>
              <ellipse cx="16" cy="20" rx="4" ry="5" fill="rgba(255,255,255,.3)"/>
              <rect x="6" y="94" width="28" height="10" rx="0 0 8 8" fill="var(--fc)" opacity=".85"/>
            </svg>
            <span>Middle</span>
          </div>
          <div class="finger" id="li" data-finger="li" style="--fc:var(--li)">
            <svg class="finger-svg tall" viewBox="0 0 40 100" xmlns="http://www.w3.org/2000/svg">
              <rect x="6" y="14" width="28" height="80" rx="8" fill="#f5c5a3"/>
              <path d="M8 55 Q20 52 32 55" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <path d="M8 72 Q20 69 32 72" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <rect x="10" y="16" width="20" height="18" rx="6" fill="#f9e0d0" stroke="#d4956a" stroke-width="1"/>
              <rect x="12" y="18" width="16" height="12" rx="4" fill="#fce8dc"/>
              <ellipse cx="16" cy="24" rx="4" ry="5" fill="rgba(255,255,255,.3)"/>
              <rect x="6" y="84" width="28" height="10" rx="0 0 8 8" fill="var(--fc)" opacity=".85"/>
            </svg>
            <span>Index</span>
          </div>
          <div class="finger thumb" id="lt" data-finger="lt" style="--fc:var(--lt)">
            <svg class="finger-svg thumb-svg" viewBox="0 0 70 55" xmlns="http://www.w3.org/2000/svg">
              <rect x="6" y="6" width="58" height="36" rx="14" fill="#f5c5a3"/>
              <path d="M20 8 Q10 20 20 44" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <ellipse cx="52" cy="16" rx="10" ry="8" fill="#f9e0d0" stroke="#d4956a" stroke-width="1"/>
              <ellipse cx="50" cy="15" rx="7" ry="5" fill="#fce8dc"/>
              <ellipse cx="47" cy="14" rx="3" ry="3" fill="rgba(255,255,255,.3)"/>
              <rect x="6" y="34" width="58" height="8" rx="0 0 14 14" fill="var(--fc)" opacity=".85"/>
            </svg>
            <span>Thumb</span>
          </div>
        </div>
      </div>

      <div class="hand" id="hand-right">
        <div class="hand-label">Right Hand</div>
        <div class="fingers">
          <div class="finger thumb" id="rt" data-finger="rt" style="--fc:var(--rt)">
            <svg class="finger-svg thumb-svg" viewBox="0 0 70 55" xmlns="http://www.w3.org/2000/svg">
              <rect x="6" y="6" width="58" height="36" rx="14" fill="#f5c5a3"/>
              <path d="M50 8 Q60 20 50 44" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <ellipse cx="18" cy="16" rx="10" ry="8" fill="#f9e0d0" stroke="#d4956a" stroke-width="1"/>
              <ellipse cx="20" cy="15" rx="7" ry="5" fill="#fce8dc"/>
              <ellipse cx="23" cy="14" rx="3" ry="3" fill="rgba(255,255,255,.3)"/>
              <rect x="6" y="34" width="58" height="8" rx="0 0 14 14" fill="var(--fc)" opacity=".85"/>
            </svg>
            <span>Thumb</span>
          </div>
          <div class="finger" id="ri" data-finger="ri" style="--fc:var(--ri)">
            <svg class="finger-svg tall" viewBox="0 0 40 100" xmlns="http://www.w3.org/2000/svg">
              <rect x="6" y="14" width="28" height="80" rx="8" fill="#f5c5a3"/>
              <path d="M8 55 Q20 52 32 55" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <path d="M8 72 Q20 69 32 72" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <rect x="10" y="16" width="20" height="18" rx="6" fill="#f9e0d0" stroke="#d4956a" stroke-width="1"/>
              <rect x="12" y="18" width="16" height="12" rx="4" fill="#fce8dc"/>
              <ellipse cx="16" cy="24" rx="4" ry="5" fill="rgba(255,255,255,.3)"/>
              <rect x="6" y="84" width="28" height="10" rx="0 0 8 8" fill="var(--fc)" opacity=".85"/>
            </svg>
            <span>Index</span>
          </div>
          <div class="finger" id="rm" data-finger="rm" style="--fc:var(--rm)">
            <svg class="finger-svg tallest" viewBox="0 0 40 110" xmlns="http://www.w3.org/2000/svg">
              <rect x="6" y="10" width="28" height="94" rx="8" fill="#f5c5a3"/>
              <path d="M8 58 Q20 55 32 58" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <path d="M8 76 Q20 73 32 76" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <rect x="10" y="12" width="20" height="18" rx="6" fill="#f9e0d0" stroke="#d4956a" stroke-width="1"/>
              <rect x="12" y="14" width="16" height="12" rx="4" fill="#fce8dc"/>
              <ellipse cx="16" cy="20" rx="4" ry="5" fill="rgba(255,255,255,.3)"/>
              <rect x="6" y="94" width="28" height="10" rx="0 0 8 8" fill="var(--fc)" opacity=".85"/>
            </svg>
            <span>Middle</span>
          </div>
          <div class="finger" id="rr" data-finger="rr" style="--fc:var(--rr)">
            <svg class="finger-svg tall" viewBox="0 0 40 100" xmlns="http://www.w3.org/2000/svg">
              <rect x="6" y="14" width="28" height="80" rx="8" fill="#f5c5a3"/>
              <path d="M8 55 Q20 52 32 55" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <path d="M8 72 Q20 69 32 72" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <rect x="10" y="16" width="20" height="18" rx="6" fill="#f9e0d0" stroke="#d4956a" stroke-width="1"/>
              <rect x="12" y="18" width="16" height="12" rx="4" fill="#fce8dc"/>
              <ellipse cx="16" cy="24" rx="4" ry="5" fill="rgba(255,255,255,.3)"/>
              <rect x="6" y="84" width="28" height="10" rx="0 0 8 8" fill="var(--fc)" opacity=".85"/>
            </svg>
            <span>Ring</span>
          </div>
          <div class="finger" id="rp" data-finger="rp" style="--fc:var(--rp)">
            <svg class="finger-svg" viewBox="0 0 40 90" xmlns="http://www.w3.org/2000/svg">
              <rect x="6" y="18" width="28" height="66" rx="8" fill="#f5c5a3"/>
              <path d="M8 50 Q20 47 32 50" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <path d="M8 65 Q20 62 32 65" stroke="#d4956a" stroke-width="1.5" fill="none"/>
              <rect x="10" y="20" width="20" height="18" rx="6" fill="#f9e0d0" stroke="#d4956a" stroke-width="1"/>
              <rect x="12" y="22" width="16" height="12" rx="4" fill="#fce8dc"/>
              <ellipse cx="16" cy="28" rx="4" ry="5" fill="rgba(255,255,255,.3)"/>
              <rect x="6" y="74" width="28" height="10" rx="0 0 8 8" fill="var(--fc)" opacity=".85"/>
            </svg>
            <span>Pinky</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Keyboard -->
    <div class="keyboard" id="keyboard"></div>

    <!-- Typing area -->
    <div class="typing-area">
      <div class="prompt-box">
        <div id="prompt-text" class="prompt-text"></div>
      </div>
      <div id="finger-hint" class="finger-hint"></div>
      <input id="type-input" class="type-input" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Start typing here...">
    </div>

    <!-- Progress -->
    <div class="progress-bar-wrap">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
  </div>

  <!-- SCREEN: Level Complete -->
  <div id="screen-levelup" class="screen">
    <div class="levelup-card">
      <div class="trophy">🏆</div>
      <h2>Level Complete!</h2>
      <p id="levelup-msg"></p>
      <div class="stars" id="levelup-stars"></div>
      <button class="btn-primary" onclick="nextLevel()">Next Level ➡️</button>
    </div>
  </div>

  <!-- SCREEN: Game Over / Win -->
  <div id="screen-win" class="screen">
    <div class="levelup-card">
      <div class="trophy">🎉</div>
      <h2>You're a Typing Star!</h2>
      <p>You finished all levels!</p>
      <div id="final-score" class="final-score"></div>
      <button class="btn-primary" onclick="restartGame()">Play Again 🔄</button>
    </div>
  </div>

  <footer style="position:fixed;bottom:10px;width:100%;text-align:center;font-size:.75rem;color:#aaa;">Created by NeilD</footer>
  <script src="game.js"></script>
</body>
</html>
